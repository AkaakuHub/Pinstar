name: Build and publish JavaScript

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: pinstar-js-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run build diagnostics
        id: diagnostic
        shell: bash
        run: |
          set +e
          bun run check > /tmp/typecheck.log 2>&1
          type_status=$?
          bun run build > /tmp/build.log 2>&1
          build_status=$?
          if [ "$build_status" = 0 ]; then
            bun test > /tmp/test.log 2>&1
            test_status=$?
          else
            echo "Tests skipped because build failed." > /tmp/test.log
            test_status=1
          fi
          {
            echo '## CI diagnostic'
            echo
            echo '### TypeScript'
            echo '```text'
            cat /tmp/typecheck.log
            echo '```'
            echo
            echo '### Build'
            echo '```text'
            cat /tmp/build.log
            echo '```'
            echo
            echo '### Tests'
            echo '```text'
            cat /tmp/test.log
            echo '```'
          } > /tmp/report.md
          echo "type_status=$type_status" >> "$GITHUB_OUTPUT"
          echo "build_status=$build_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"

      - name: Publish diagnostic to temporary closed issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 1 --body-file /tmp/report.md

      - name: Fail on validation error
        if: steps.diagnostic.outputs.type_status != '0' || steps.diagnostic.outputs.build_status != '0' || steps.diagnostic.outputs.test_status != '0'
        run: exit 1

      - name: Publish pinstar.js to js branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin js
          git worktree add --force -B js publish origin/js
          cp dist/pinstar.js publish/pinstar.js
          cd publish
          git add pinstar.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "build: ${GITHUB_SHA}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" js
