name: Build and publish JavaScript

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pinstar-js-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Strict TypeScript check
        continue-on-error: true
        run: bun run check

      - name: Build complete browser bundle
        run: bun run build

      - name: Test source and generated bundle
        run: bun test

      - name: Publish pinstar.js to js branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin js
          git worktree add --force -B js publish origin/js
          cp dist/pinstar.js publish/pinstar.js
          cd publish
          git add pinstar.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "build: ${GITHUB_SHA}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" js
